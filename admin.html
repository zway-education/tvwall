<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電視牆後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1f8a5c; --green-d:#176b47; --cream:#faf7f2; --ink:#23201c;
    --gold:#b8924a; --line:#e6e0d6; --panel:#fff; --muted:#8a8377;
    --ok:#1f8a5c; --warn:#c8861a; --danger:#c0392b; --shadow:0 2px 10px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--cream);color:var(--ink);height:100vh;overflow:hidden}
  h1,h2,h3{font-family:"Noto Serif TC",serif}
  button{font-family:inherit}
  .btn{border:0;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--green);color:#fff}
  .btn.ghost{background:#f1ede5;color:var(--ink)}
  .btn.danger{background:#fbe9e7;color:var(--danger)}
  .btn:hover{filter:brightness(1.04)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ===== 密碼鎖 ===== */
  #lock{position:fixed;inset:0;background:linear-gradient(135deg,#1f8a5c,#0e1a14);
    display:grid;place-items:center;z-index:100}
  .lockbox{background:#fff;border-radius:18px;padding:34px 30px;width:300px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .lockbox h2{font-size:20px;margin-bottom:6px}
  .lockbox p{font-size:13px;color:var(--muted);margin-bottom:18px}
  .lockbox input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:18px;
    text-align:center;letter-spacing:6px;margin-bottom:12px;font-family:inherit}
  .lockerr{color:var(--danger);font-size:13px;height:16px;margin-bottom:6px}

  /* ===== 上列 ===== */
  .topbar{height:58px;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:0 18px;box-shadow:var(--shadow);position:relative;z-index:5}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px}
  .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--green);color:#fff;display:grid;place-items:center}
  .status{margin-left:auto;display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;
    font-size:13.5px;font-weight:700;border:1px solid #cfe8da;background:#eef7f1;color:var(--green-d)}
  .status.saving{background:#fdf4e3;border-color:#f0dcb0;color:var(--warn)}
  .status.error{background:#fbe9e7;border-color:#f1c3bd;color:var(--danger)}
  .status .pulse{width:9px;height:9px;border-radius:50%;background:currentColor}

  /* ===== 版面 ===== */
  .wrap{display:grid;grid-template-columns:262px 1fr 380px;height:calc(100vh - 58px)}
  .side{background:#fbf9f5;border-right:1px solid var(--line);overflow-y:auto;padding:12px 10px}
  .grp{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.8px;margin:14px 8px 6px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:14.5px;color:#3b372f}
  .nav-item:hover{background:#f0ece3}
  .nav-item.active{background:var(--green);color:#fff;font-weight:700}
  .nav-item .ico{width:20px;text-align:center}
  .addbtn{width:100%;border:1px dashed #c3bcae;background:#fff;border-radius:10px;padding:10px;margin-top:6px;
    cursor:pointer;color:var(--green-d);font-weight:700;font-size:14px}
  .addbtn:hover{border-color:var(--green);background:#f4faf6}
  .slide-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:9px;cursor:pointer;font-size:13.5px}
  .slide-row:hover{background:#f0ece3}
  .slide-row.active{background:var(--green);color:#fff;font-weight:700}
  .slide-row .num{width:22px;height:22px;border-radius:6px;background:#ece7dd;display:grid;place-items:center;
    font-size:11px;font-weight:800;color:#6b6456;flex:none}
  .slide-row.active .num{background:rgba(255,255,255,.25);color:#fff}
  .slide-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slide-row .ord{display:flex;flex-direction:column;line-height:.7}
  .slide-row .ord button{border:0;background:transparent;cursor:pointer;font-size:11px;color:inherit;opacity:.55;padding:1px}
  .slide-row .ord button:hover{opacity:1}
  .eye{font-size:14px;cursor:pointer;opacity:.4;flex:none}
  .eye.on{opacity:1}

  .editor{overflow-y:auto;padding:24px 30px}
  .ed-head{display:flex;align-items:center;gap:11px;margin-bottom:3px}
  .ed-head .badge{background:#ece7dd;color:#6b6456;font-size:12px;font-weight:800;padding:4px 10px;border-radius:7px}
  .ed-head h2{font-size:22px}
  .ed-sub{color:var(--muted);font-size:13px;margin:4px 0 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:15px;box-shadow:var(--shadow)}
  .card h3{font-size:14.5px;margin-bottom:13px;display:flex;align-items:center;gap:8px}
  .card h3 .k{width:6px;height:17px;background:var(--green);border-radius:3px;display:inline-block}
  label.f{display:block;font-size:13px;font-weight:700;color:#5a554b;margin:0 0 6px}
  label.f small{font-weight:400;color:var(--muted)}
  .inp,textarea.inp{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fff}
  textarea.inp{resize:vertical;min-height:64px;line-height:1.6}
  .inp:focus,textarea.inp:focus{outline:0;border-color:var(--green);box-shadow:0 0 0 3px #e0f0e8}
  .fld{margin-bottom:14px}.fld:last-child{margin-bottom:0}
  .note{background:#f6f2ea;border-radius:10px;padding:11px 13px;font-size:13px;color:#6b6456;line-height:1.6}

  /* image dropzone */
  .drop{border:2px dashed #d6cfc1;border-radius:12px;padding:14px;background:#fbf9f5;display:flex;gap:14px;align-items:center}
  .drop .thumb{width:78px;height:78px;border-radius:10px;flex:none;background:#eef3f0;display:grid;place-items:center;
    color:var(--green-d);font-size:24px;overflow:hidden;border:1px solid var(--line)}
  .drop .thumb img{width:100%;height:100%;object-fit:cover}
  .drop .dz{flex:1}
  .drop .dz b{font-size:14px}
  .drop .dz .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .drop .acts{display:flex;gap:7px;margin-top:9px}
  .file-btn{position:relative;overflow:hidden;display:inline-block}
  .file-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}

  .inline-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#f6f2ea;border-radius:10px;padding:12px 14px}
  .seg{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:#5a554b}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .stepper button{border:0;background:#fff;width:30px;height:32px;font-size:16px;cursor:pointer;color:var(--green)}
  .stepper input{width:44px;border:0;text-align:center;font-size:14px;font-weight:700;font-family:inherit}
  .switch{position:relative;width:44px;height:25px;background:#cfc8ba;border-radius:999px;cursor:pointer;transition:.2s;flex:none}
  .switch.on{background:var(--green)}
  .switch::after{content:"";position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}
  .switch.on::after{left:21.5px}
  .sel{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff}
  .item-card{border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:11px;position:relative;background:#fff}
  .item-card .hd{display:flex;align-items:center;margin-bottom:10px}
  .item-card .hd .t{font-weight:800;font-size:13px;color:#6b6456}
  .item-card .hd .a{margin-left:auto;display:flex;gap:5px}
  .icon-btn{border:1px solid var(--line);background:#fff;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:14px}
  .icon-btn.danger{color:var(--danger)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

  /* preview */
  .preview{background:#f3efe8;border-left:1px solid var(--line);padding:16px 14px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
  .pv-title{font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .pv-live{display:inline-flex;align-items:center;gap:5px;color:var(--green-d);background:#e3f1e9;padding:2px 8px;border-radius:6px;font-size:11px}
  .screenwrap{background:#0e1a14;border-radius:12px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.18);aspect-ratio:16/9;position:relative}
  .screenwrap iframe{position:absolute;top:0;left:0;width:1920px;height:1080px;border:0;transform-origin:top left}
  .pv-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.5}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green-d);color:#fff;
    padding:11px 20px;border-radius:999px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.3s;
    box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:50}
  .toast.show{opacity:1;bottom:30px}
  .toast.err{background:var(--danger)}
</style>
</head>
<body>

<!-- ===== 密碼鎖 ===== -->
<div id="lock">
  <div class="lockbox">
    <div style="font-size:34px">🔒</div>
    <h2>電視牆後台</h2>
    <p>請輸入密碼進入</p>
    <input id="lock-input" type="password" inputmode="numeric" maxlength="12" placeholder="••••" autofocus>
    <div class="lockerr" id="lock-err"></div>
    <button class="btn primary" style="width:100%" onclick="tryUnlock()">進入</button>
  </div>
</div>

<!-- ===== 主畫面(解鎖後顯示)===== -->
<div id="app" hidden>
  <div class="topbar">
    <div class="brand"><span class="dot">電</span>電視牆後台</div>
    <div class="status" id="status"><span class="pulse"></span> <span id="status-txt">已儲存 ・ 電視牆已同步</span></div>
    <button class="btn ghost" onclick="window.open('index.html','_blank')">🖥 開電視牆</button>
  </div>

  <div class="wrap">
    <aside class="side">
      <div class="grp">⭐ 常用內容</div>
      <div class="nav-item" data-nav="content:highlights" onclick="selectNav('content:highlights')"><span class="ico">📸</span>課程花絮照片</div>
      <div class="nav-item" data-nav="content:testimony" onclick="selectNav('content:testimony')"><span class="ico">💬</span>真實見證</div>

      <div class="grp">🖼 每張電視畫面</div>
      <div id="slide-list"></div>

      <div class="grp">⚙ 整體設定(很少動)</div>
      <div class="nav-item" data-nav="settings" onclick="selectNav('settings')"><span class="ico">🎨</span>配色 / 版型 / 方向 / LOGO</div>

      <div class="grp">💾 備份</div>
      <div class="nav-item" data-nav="backup" onclick="selectNav('backup')"><span class="ico">📦</span>匯出 / 匯入備份</div>
    </aside>

    <main class="editor" id="editor"></main>

    <aside class="preview">
      <div class="pv-title">即時預覽 <span class="pv-live">● LIVE</span></div>
      <div class="screenwrap" id="screenwrap">
        <iframe id="pv" src="index.html?embedded=1" title="電視牆預覽"></iframe>
      </div>
      <div class="pv-hint">改任何東西會自動存,這個預覽和真正的電視牆會一起更新。<br>點左邊不同畫面,這裡會跳到那一張。</div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="defaults.js"></script>
<script src="js/schema.js"></script>
<script src="js/store.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   電視牆後台 v2 ・ 本機 IndexedDB ・ 即時預覽 ・ 自動存
   ════════════════════════════════════════════════════════════ */

// ── 密碼(client-side gate;非高安全,僅擋非操作者。app 公開於 Vercel)──
const ADMIN_PASS = '63811';
function tryUnlock(){
  const v = document.getElementById('lock-input').value.trim();
  if (v === ADMIN_PASS){
    sessionStorage.setItem('tvwall_admin_ok','1');
    document.getElementById('lock').style.display='none';
    document.getElementById('app').hidden=false;
    initApp();
  } else {
    document.getElementById('lock-err').textContent='密碼不對,再試一次';
    document.getElementById('lock-input').value='';
  }
}
document.getElementById('lock-input').addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });
if (sessionStorage.getItem('tvwall_admin_ok')==='1'){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').hidden=false;
}

// ── 每張畫面的可編輯欄位定義 ──
const SLIDE_META = [
  {id:1, name:'主視覺 ・ 先懂心再懂教', fields:['bg']},
  {id:2, name:'班級卡片(4 班別)',     fields:['stages','bg']},
  {id:3, name:'四大覺知系統',          fields:['bg'], note:'這張是固定設計,可換背景圖 + 調顯示/秒數/排序。'},
  {id:4, name:'真實見證',              fields:['testimonies','bg']},
  {id:5, name:'心智光譜 QR',           fields:['qr-mindspectrum','bg']},
  {id:6, name:'加 LINE',               fields:['qr-line','bg']},
  {id:7, name:'課程花絮',              fields:['highlights','bg']},
  {id:8, name:'SEL ・ 五大能力',       fields:[], note:'固定設計畫面。可調顯示/秒數/排序。'},
  {id:9, name:'4C ・ 國際素養',        fields:[], note:'固定設計畫面。可調顯示/秒數/排序。'},
  {id:10,name:'學習動機 ・ CTA',       fields:[], note:'固定設計畫面。可調顯示/秒數/排序。'},
  {id:11,name:'社群三合一(FB/IG/LINE)',fields:['qr-facebook','qr-instagram','qr-line']},
  {id:12,name:'AI 時代 ・ 非認知能力', fields:[], note:'固定設計畫面。可調顯示/秒數/排序。'},
  {id:13,name:'8 位智庫專家',          fields:[], note:'固定設計畫面(專家照片內建)。可調顯示/秒數/排序。'},
  {id:14,name:'關鍵提問',              fields:['qr-line']},
  {id:15,name:'CTA ・ 加 LINE',        fields:['qr-line']},
];
const QR_DEF = {
  'qr-line':        {urlKey:'line',        imgKey:'qrImageLine',        label:'加 LINE 好友'},
  'qr-mindspectrum':{urlKey:'mindspectrum',imgKey:'qrImageMindspectrum',label:'心智光譜測驗'},
  'qr-facebook':    {urlKey:'facebook',    imgKey:'qrImageFacebook',    label:'Facebook'},
  'qr-instagram':   {urlKey:'instagram',   imgKey:'qrImageInstagram',   label:'Instagram'},
};
const IMG_MAXDIM = { bg:1600, stage:700, highlight:500, qr:900, logo:800 };

let state = null;          // 設定(v1 shape)
let curNav = null;
let curSlideId = null;

/* ── 啟動 ── */
async function initApp(){
  try {
    state = await TVWALL_store.loadOrMigrate();
    if (!state) state = TVWALL_merge ? TVWALL_merge({}) : {};
  } catch(e){
    setStatus('error','讀取失敗:'+(e&&e.message));
    state = TVWALL_merge ? TVWALL_merge({}) : {};
  }
  ensureShape();
  renderSlideList();
  // 預設開第一張在播的畫面
  const firstId = effectiveOrder()[0] || 1;
  selectNav('slide:'+firstId);
  // iframe 載入完成 → 跳到目前畫面
  document.getElementById('pv').addEventListener('load', ()=> previewShow(curSlideId));
}

function ensureShape(){
  state.qr = state.qr || {line:'',mindspectrum:'',facebook:'',instagram:''};
  state.testimonies = state.testimonies || [];
  state.stages = state.stages || [];
  state.durations = state.durations || {};
  state.highlights = state.highlights || [];
  state.hiddenSlides = Array.isArray(state.hiddenSlides) ? state.hiddenSlides : [];
  state.slidesOrder = Array.isArray(state.slidesOrder) ? state.slidesOrder : [];
}

// 有效排序:用 slidesOrder,補上任何遺漏的 id,確保 1..15 都在
function effectiveOrder(){
  const all = SLIDE_META.map(s=>s.id);
  const ord = (state.slidesOrder||[]).filter(id=>all.includes(id));
  all.forEach(id=>{ if(!ord.includes(id)) ord.push(id); });
  return ord;
}
function isShown(id){ return !(state.hiddenSlides||[]).includes(id); }
function durOf(id){ return Math.round((state.durations['s'+id]||8000)/1000); }

/* ── 左欄 slide 清單 ── */
function renderSlideList(){
  const ord = effectiveOrder();
  document.getElementById('slide-list').innerHTML = ord.map((id,i)=>{
    const m = SLIDE_META.find(s=>s.id===id);
    return `<div class="slide-row ${curNav==='slide:'+id?'active':''}" data-nav="slide:${id}" onclick="selectNav('slide:${id}')">
      <span class="ord">
        <button title="往上" onclick="event.stopPropagation();moveSlide(${i},-1)">▲</button>
        <button title="往下" onclick="event.stopPropagation();moveSlide(${i},1)">▼</button>
      </span>
      <span class="num">${id}</span>
      <span class="nm">${m?m.name:('Slide '+id)}</span>
      <span class="eye ${isShown(id)?'on':''}" title="顯示/隱藏" onclick="event.stopPropagation();toggleShow(${id})">${isShown(id)?'👁':'🚫'}</span>
    </div>`;
  }).join('');
}
function moveSlide(i,dir){
  const ord = effectiveOrder();
  const j = i+dir; if(j<0||j>=ord.length) return;
  [ord[i],ord[j]]=[ord[j],ord[i]];
  state.slidesOrder = ord;
  renderSlideList(); scheduleSave();
}
function toggleShow(id){
  const h = state.hiddenSlides||[];
  const k = h.indexOf(id);
  if(k>=0) h.splice(k,1); else h.push(id);
  state.hiddenSlides = h;
  renderSlideList(); scheduleSave();
}

/* ── 導覽選擇 ── */
function selectNav(nav){
  curNav = nav;
  document.querySelectorAll('.nav-item,.slide-row').forEach(x=>x.classList.toggle('active', x.dataset.nav===nav));
  renderSlideList();
  if (nav.startsWith('slide:')){ curSlideId = +nav.split(':')[1]; renderSlideEditor(curSlideId); previewShow(curSlideId); }
  else if (nav==='content:highlights'){ curSlideId=7; renderHighlightsEditor(true); previewShow(7); }
  else if (nav==='content:testimony'){ curSlideId=4; renderTestimoniesEditor(true); previewShow(4); }
  else if (nav==='settings'){ renderSettings(); }
  else if (nav==='backup'){ renderBackup(); }
}

/* ── 每張 slide 編輯器 ── */
function renderSlideEditor(id){
  const m = SLIDE_META.find(s=>s.id===id);
  let html = `<div class="ed-head"><span class="badge">畫面 ${id}</span><h2>${m.name}</h2></div>
    <div class="ed-sub">這一張的所有設定都在這裡。改完自動存,右邊預覽會跟著變。</div>`;
  // 播放控制(每張都有)
  html += `<div class="card"><h3><span class="k"></span>這張怎麼播</h3>
    <div class="inline-controls">
      <span class="seg">在電視上顯示 <span class="switch ${isShown(id)?'on':''}" onclick="toggleShow(${id});renderSlideEditor(${id})"></span></span>
      <span style="width:1px;height:24px;background:var(--line)"></span>
      <span class="seg">停留秒數 <span class="stepper">
        <button onclick="changeDur(${id},-1)">−</button><input id="dur-in" value="${durOf(id)}" readonly><button onclick="changeDur(${id},1)">+</button></span></span>
    </div></div>`;
  if (m.note) html += `<div class="card"><div class="note">ℹ️ ${m.note}</div></div>`;
  (m.fields||[]).forEach(f=>{ html += fieldCard(f, id); });
  document.getElementById('editor').innerHTML = html;
  if (m.fields.includes('stages')) bindStages();
  if (m.fields.includes('testimonies')) bindTestimonies();
  if (m.fields.includes('highlights')) bindHighlights();
}
function changeDur(id,d){
  const s = Math.max(1, durOf(id)+d);
  state.durations['s'+id] = s*1000;
  const el=document.getElementById('dur-in'); if(el) el.value=s;
  scheduleSave();
}

/* ── 各欄位卡片 ── */
function fieldCard(f, id){
  if (f==='bg') return imageCard('背景圖', '這張畫面的背景照片(留空就用內建色塊)', 'bgImageS'+id, 'bg');
  if (f==='stages') return `<div class="card"><h3><span class="k"></span>4 個班別卡片</h3><div id="stages-box"></div>
      <button class="btn ghost" onclick="addStage()" style="margin-top:4px">＋ 新增班別</button></div>`;
  if (f==='testimonies') return `<div class="card"><h3><span class="k"></span>見證內容</h3>
      <div class="fld"><label class="f">每則停留秒數</label><span class="stepper">
        <button onclick="changeTi(-1)">−</button><input id="ti-in" value="${Math.round((state.testimonyInterval||6000)/1000)}" readonly><button onclick="changeTi(1)">+</button></span></div>
      <div id="testi-box"></div>
      <button class="btn ghost" onclick="addTestimony()" style="margin-top:4px">＋ 新增見證</button></div>`;
  if (f==='highlights') return `<div class="card"><h3><span class="k"></span>花絮照片</h3>
      ${(state.highlights||[]).length===0?'<div class="note" style="margin-bottom:10px">⚠️ 目前沒有照片,這張在電視牆上會自動跳過。加一張才會播。</div>':''}
      <div id="hl-box"></div>
      <button class="btn ghost" onclick="addHighlight()" style="margin-top:4px">＋ 新增花絮</button></div>`;
  if (f.startsWith('qr-')){
    const d = QR_DEF[f];
    return `<div class="card"><h3><span class="k"></span>QR:${d.label}</h3>
      <div class="note" style="margin-bottom:10px">ℹ️ 這個 QR 全站共用,改一處,所有用到它的畫面都會一起換。</div>
      <div class="fld"><label class="f">連結網址 <small>(填網址會自動生成 QR)</small></label>
        <input class="inp" value="${esc(state.qr[d.urlKey]||'')}" oninput="state.qr['${d.urlKey}']=this.value.trim();scheduleSave()"></div>
      ${imageRow('或上傳自己的 QR 圖(選填,蓋過上面網址)', d.imgKey, 'qr')}
    </div>`;
  }
  return '';
}

/* ── 圖片卡 / 列 ── */
function imageCard(title, sub, key, kind){
  return `<div class="card"><h3><span class="k"></span>${title}</h3>${imageRow(sub, key, kind)}</div>`;
}
function imageRow(sub, key, kind){
  const v = state[key]||'';
  const kb = v ? (Math.round(v.length*0.75/1024).toFixed(0)+' KB') : '';
  return `<div class="drop">
    <div class="thumb" id="thumb-${key}">${v?`<img src="${v}">`:'🖼'}</div>
    <div class="dz"><b>${sub}</b><div class="meta" id="meta-${key}">${v?('已上傳 ・ '+kb):'尚未上傳'}</div>
      <div class="acts">
        <label class="btn primary file-btn">選圖片<input type="file" accept="image/*" onchange="uploadImg(event,'${key}','${kind}')"></label>
        ${v?`<button class="btn danger" onclick="clearImg('${key}')">移除</button>`:''}
      </div>
    </div></div>`;
}
async function uploadImg(ev, key, kind){
  const file = ev.target.files[0]; if(!file) return;
  if (file.size > 10*1024*1024){ toast('圖片太大(超過 10MB)','err'); return; }
  try{
    const preferPng = (kind==='qr');
    const dim = IMG_MAXDIM[kind] || 800;
    const dataUrl = await compressImage(file, dim, 0.85, preferPng);
    state[key] = dataUrl;
    refreshImg(key);
    scheduleSave();
    toast('📷 已上傳 ・ 自動存');
  }catch(e){ toast('處理失敗:'+e.message,'err'); }
  ev.target.value='';
}
function clearImg(key){ state[key]=''; refreshImg(key); scheduleSave(); }
function refreshImg(key){
  const v=state[key]||'';
  const t=document.getElementById('thumb-'+key); if(t) t.innerHTML = v?`<img src="${v}">`:'🖼';
  const m=document.getElementById('meta-'+key); if(m) m.textContent = v?('已上傳 ・ '+(Math.round(v.length*0.75/1024))+' KB'):'尚未上傳';
  // 若按鈕區要顯示/隱藏「移除」,重繪整個編輯器最簡單
  if (curNav && curNav.startsWith('slide:')) renderSlideEditor(curSlideId);
}

async function doExport(){
  try{
    await TVWALL_store.saveConfig(state);
    const blob = await TVWALL_store.exportAll();
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='電視牆備份_'+new Date().toISOString().slice(0,10)+'.json'; a.click();

  }catch(e){ toast('匯出失敗:'+e.message,'err'); }

async function doImport(ev){
  const file=ev.target.files[0]; if(!file)return;
  if(!confirm('確定用這個備份檔覆蓋目前設定?'))return;
  try{
    const txt=await file.text();
    state=await TVWALL_store.importAll(txt);
    ensureShape();
    TVWALL_store.notifyUpdated(); pingPreview();
    renderSlideList(); selectNav('slide:'+(effectiveOrder()[0]||1));
    toast('已還原 ・ 電視牆已更新');
  }catch(e){ toast('匯入失敗(檔案可能不對):'+e.message,'err'); }

/* ── 自動存 + 即時同步 ── */
let saveTimer=null, saveChain=Promise.resolve();
function scheduleSave(){
  state._savedAt = Date.now();
  setStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ saveTimer=null; doSave(); }, 350);
}
function doSave(){
  const snap = JSON.parse(JSON.stringify(state));   // 快照,避免存到一半又被改
  saveChain = saveChain.then(async ()=>{
    try{
      await TVWALL_store.saveConfig(snap);
      TVWALL_store.notifyUpdated();   // → 真正的電視牆(其他分頁/視窗)
      pingPreview();                   // → 右邊預覽 iframe
      setStatus('saved');
    }catch(e){
      setStatus('error','儲存失敗,請重試:'+(e&&e.message));
      toast('⚠ 儲存失敗:'+(e&&e.message),'err');
    }
  });
  return saveChain;
}
// 關視窗 / 切走前:把還沒寫進 IndexedDB 的變更保住(localStorage 同步寫 + 盡力寫 IDB)
function flushSaveSync(){
  if(saveTimer){ clearTimeout(saveTimer); saveTimer=null; }
  if(!state) return;
  try{ state._savedAt = Date.now(); localStorage.setItem('tvwall_config', JSON.stringify(state)); }catch(e){}
  try{ TVWALL_store.saveConfig(JSON.parse(JSON.stringify(state))); TVWALL_store.notifyUpdated(); }catch(e){}
}
window.addEventListener('pagehide', flushSaveSync);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) flushSaveSync(); });
function pingPreview(){
  const f=document.getElementById('pv');
  if(f&&f.contentWindow){
    f.contentWindow.postMessage({type:'tvwall-reload-config'},'*');
    if(curSlideId!=null) setTimeout(()=>previewShow(curSlideId),120);
  }
}
function previewShow(id){
  const f=document.getElementById('pv');
  if(f&&f.contentWindow&&id!=null) f.contentWindow.postMessage({type:'tvwall-preview-show',slideId:id},'*');
}
function previewStyle(){
  const f=document.getElementById('pv');
  if(f&&f.contentWindow) f.contentWindow.postMessage({type:'tvwall-preview-style',theme:state.theme,layout:state.layout,orientation:state.orientation},'*');
}

/* ── 狀態列 ── */
function setStatus(kind,msg){
  const el=document.getElementById('status'), t=document.getElementById('status-txt');
  el.className='status'+(kind==='saving'?' saving':kind==='error'?' error':'');
  t.textContent = kind==='saving'?'儲存中…' : kind==='error'?(msg||'儲存失敗') : '已儲存 ・ 電視牆已同步';
}
function toast(m,kind){ const el=document.getElementById('toast'); el.textContent=m; el.className='toast show'+(kind==='err'?' err':''); setTimeout(()=>el.className='toast'+(kind==='err'?' err':''),1800); }

/* ── 預覽 iframe 縮放(1920x1080 → 容器寬)── */
function scalePreview(){
  const wrap=document.getElementById('screenwrap'), f=document.getElementById('pv');
  if(!wrap||!f) return;
  const w=wrap.clientWidth, scale=w/1920;
  f.style.transform='scale('+scale+')';
  wrap.style.height=(1080*scale)+'px';
}
window.addEventListener('resize',scalePreview);

/* ── utils ── */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// compressImage — 沿用舊後台同一套(canvas 壓縮;QR 走 PNG 無損)
async function compressImage(file, maxDim, quality, preferPng){
  return new Promise((resolve,reject)=>{
    const fileName=(file.name||'').toLowerCase();
    const isPng=preferPng||file.type==='image/png'||fileName.endsWith('.png');
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('讀取失敗'));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('圖片格式不對'));
      img.onload=()=>{
        let dim=maxDim;
        const render=(d)=>{ const ratio=Math.min(d/img.width,d/img.height,1);
          const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
          const c=document.createElement('canvas'); c.width=w;c.height=h;
          const ctx=c.getContext('2d'); ctx.imageSmoothingQuality='high'; ctx.clearRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); return c; };
        const PNG_BUDGET=250000, JPEG_BUDGET=180000;
        if(isPng){
          let c=render(dim), r=c.toDataURL('image/png');
          while(r.length>PNG_BUDGET&&dim>64){ dim=Math.round(dim*0.85); c=render(dim); r=c.toDataURL('image/png'); }
          if(r.length>PNG_BUDGET){ const c2=render(maxDim); let q=quality; r=c2.toDataURL('image/jpeg',q);
            while(r.length>JPEG_BUDGET&&q>0.3){ q-=0.1; r=c2.toDataURL('image/jpeg',q); } }
          resolve(r);
        } else {
          const c=render(dim); let q=quality, r=c.toDataURL('image/jpeg',q);
          while(r.length>JPEG_BUDGET&&q>0.3){ q-=0.1; r=c.toDataURL('image/jpeg',q); }
          resolve(r);
        }
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// 若已解鎖(sessionStorage)直接啟動
if (sessionStorage.getItem('tvwall_admin_ok')==='1') initApp();
setTimeout(scalePreview, 300);
