<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>電視牆 ・ 同步預覽編輯</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f8a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="電視牆編輯">
<link rel="apple-touch-icon" href="icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #1f8a5c;
    --brand-deep: #0e6340;
    --accent: #c9a96e;
    --cream: #faf7f2;
    --ink: #2a2620;
    --ink-soft: #5a5048;
    --border: #e8ddc8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: "Noto Sans TC","PingFang TC",sans-serif;
    background: #f3ede1;
    color: var(--ink);
  }

  /* ====== 頂部工具列 ====== */
  header {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
    color: var(--cream);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 4px 16px rgba(14,99,64,.2);
    z-index: 100;
    position: relative;
  }
  header h1 {
    font-family: "Noto Serif TC", serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin: 0;
    letter-spacing: .02em;
  }
  header h1 small {
    display: block;
    font-size: .65rem;
    opacity: .8;
    letter-spacing: .2em;
    font-family: "Noto Sans TC", sans-serif;
    margin-top: 2px;
  }
  .tools { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* 方向切換 */
  .orient-toggle {
    display: inline-flex;
    background: rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 3px;
  }
  .orient-toggle button {
    background: transparent;
    color: var(--cream);
    border: none;
    padding: 6px 14px;
    border-radius: 16px;
    font-size: .85rem;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .orient-toggle button.active {
    background: var(--accent);
    color: var(--brand-deep);
    font-weight: 700;
  }

  .btn {
    background: rgba(255,255,255,.15);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,.25);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: .85rem;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { background: rgba(255,255,255,.25); }
  .btn-primary {
    background: var(--accent);
    color: var(--brand-deep);
    border: none;
    font-weight: 700;
  }
  .btn-primary:hover { background: #e0b87e; }

  /* ====== 主內容區 ====== */
  main {
    height: calc(100% - 56px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }

  /* 左:預覽 */
  .preview-pane {
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-pane .label {
    position: absolute;
    top: 8px; left: 12px;
    color: rgba(255,255,255,.4);
    font-size: .7rem;
    letter-spacing: .2em;
    z-index: 5;
  }
  .preview-frame {
    border: none;
    background: #000;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
    transition: all .3s;
  }
  /* 橫式 16:9 */
  .preview-pane.horizontal .preview-frame {
    width: 100%;
    max-width: 100%;
    aspect-ratio: 16/9;
    max-height: 100%;
  }
  /* 直式 9:16 */
  .preview-pane.vertical .preview-frame {
    height: 100%;
    aspect-ratio: 9/16;
    max-width: 100%;
    width: auto;
  }

  /* 右:編輯表單(iframe admin.html) */
  .form-pane {
    background: #f3ede1;
    overflow: hidden;
    border-left: 1px solid var(--border);
  }
  .form-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #fbf7f1;
  }
  @media (max-width: 900px) {
    .form-pane { border-left: none; border-top: 1px solid var(--border); }
  }

  /* 沒設雲端時的警告 */
  .warn {
    background: #fdecec;
    color: #7d1f1f;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: .85rem;
    margin-right: auto;
  }

  /* 重新整理 spinner */
  .refreshing { animation: spin 1s linear; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>K12覺知素養教育學苑<small>同 步 預 覽 編 輯</small></h1>
  <div class="tools">
    <div class="orient-toggle">
      <button id="btn-h" class="active" onclick="setOrient('horizontal')">📺 橫式</button>
      <button id="btn-v" onclick="setOrient('vertical')">📱 直式</button>
    </div>
    <button class="btn" id="btn-refresh" onclick="refreshPreview()">🔄 重整預覽</button>
    <button class="btn" onclick="window.open('admin.html', '_blank')">↗ 開全螢幕編輯</button>
    <button class="btn" onclick="window.open('index.html', '_blank')">↗ 開電視牆</button>
  </div>
</header>

<main>

  <div class="preview-pane horizontal" id="preview-pane">
    <span class="label">📺 LIVE PREVIEW</span>
    <iframe class="preview-frame" id="preview-frame" src="index.html?embedded=1"></iframe>
  </div>

  <div class="form-pane">
    <iframe class="form-frame" id="form-frame" src="admin.html"></iframe>
  </div>

</main>

<script>
  let currentOrient = 'horizontal';
  let autoRefreshTimer = null;

  function setOrient(orient) {
    currentOrient = orient;
    const pane = document.getElementById('preview-pane');
    pane.className = 'preview-pane ' + orient;
    document.getElementById('btn-h').classList.toggle('active', orient === 'horizontal');
    document.getElementById('btn-v').classList.toggle('active', orient === 'vertical');
    // reload iframe with new orient param
    const frame = document.getElementById('preview-frame');
    const base = 'index.html?embedded=1';
    frame.src = orient === 'vertical' ? base + '&orient=vertical' : base;
  }

  function refreshPreview() {
    const frame = document.getElementById('preview-frame');
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('refreshing');
    setTimeout(() => btn.classList.remove('refreshing'), 1000);
    // 加上 timestamp 強制 reload
    const base = currentOrient === 'vertical' ? 'index.html?embedded=1&orient=vertical' : 'index.html?embedded=1';
    frame.src = base + '&t=' + Date.now();
  }

  // 自動每 30 秒重整一次(雲端 polling 已有,這只是 fallback)
  function startAutoRefresh() {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => {
      // 不重整 iframe,讓 index.html 自己 poll 雲端就好
      // 此處留空,將來想加可在這
    }, 30000);
  }

  // 接收 admin iframe 的 postMessage(若 admin 儲存後通知)
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'tvwall-saved') {
      // admin 儲存了 → 等 2 秒讓 Apps Script 寫完 → 重整預覽
      setTimeout(refreshPreview, 2000);
    }
  });

  startAutoRefresh();
</script>

</body>
</html>
